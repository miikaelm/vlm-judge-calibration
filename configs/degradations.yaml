# Degradation configurations — full sweep
# HTML-layer: ~74 configs | Image-layer: 9 configs | Total: 83 configs
# Each config combines with edit_types × templates to form the stimulus table.
#
# Jitter convention: numeric params use min_X / max_X pairs.
# At generation time, resolve_jitter() samples uniformly from each [min, max] window
# and stores the resolved value under the bare key (e.g. delta_e, offset_x_px).
# The magnitude field names the perceptual tier; exact sampled values are in metadata.

degradations:

  # ---------------------------------------------------------------------------
  # COLOR OFFSET — ΔE in CIEDE2000
  # 10 tiers, jittered within each perceptual window
  # ---------------------------------------------------------------------------
  - id: color_offset_micro
    dimension: color_offset
    magnitude: micro
    layer: html
    params:
      min_delta_e: 0.5
      max_delta_e: 1.5
    notes: "Sub-threshold color shift (ΔE ~1)"

  - id: color_offset_tiny
    dimension: color_offset
    magnitude: tiny
    layer: html
    params:
      min_delta_e: 1.5
      max_delta_e: 2.5
    notes: "Near-threshold color shift (ΔE ~2)"

  - id: color_offset_subtle
    dimension: color_offset
    magnitude: subtle
    layer: html
    params:
      min_delta_e: 2.5
      max_delta_e: 4.0
    notes: "Subtle color shift (ΔE ~3)"

  - id: color_offset_small
    dimension: color_offset
    magnitude: small
    layer: html
    params:
      min_delta_e: 4.0
      max_delta_e: 6.5
    notes: "Just-noticeable color shift (ΔE ~5)"

  - id: color_offset_moderate
    dimension: color_offset
    magnitude: moderate
    layer: html
    params:
      min_delta_e: 6.5
      max_delta_e: 9.0
    notes: "Moderate color shift (ΔE ~7)"

  - id: color_offset_medium
    dimension: color_offset
    magnitude: medium
    layer: html
    params:
      min_delta_e: 9.0
      max_delta_e: 13.0
    notes: "Clearly visible color shift (ΔE ~10)"

  - id: color_offset_strong
    dimension: color_offset
    magnitude: strong
    layer: html
    params:
      min_delta_e: 13.0
      max_delta_e: 18.0
    notes: "Strong color shift (ΔE ~15)"

  - id: color_offset_large
    dimension: color_offset
    magnitude: large
    layer: html
    params:
      min_delta_e: 18.0
      max_delta_e: 26.0
    notes: "Large color shift (ΔE ~20)"

  - id: color_offset_very_large
    dimension: color_offset
    magnitude: very_large
    layer: html
    params:
      min_delta_e: 26.0
      max_delta_e: 36.0
    notes: "Very large color shift (ΔE ~30)"

  - id: color_offset_xlarge
    dimension: color_offset
    magnitude: xlarge
    layer: html
    params:
      min_delta_e: 36.0
      max_delta_e: 50.0
    notes: "Obviously wrong color (ΔE ~40)"

  # ---------------------------------------------------------------------------
  # POSITION OFFSET — 4 directions × 3 tiers = 12 configs
  # Signed ranges: negative values = left / up direction
  # ---------------------------------------------------------------------------
  - id: position_offset_right_small
    dimension: position_offset
    magnitude: small
    layer: html
    params:
      min_offset_x_px: 3
      max_offset_x_px: 10
      offset_y_px: 0
    notes: "Shift ~5px right"

  - id: position_offset_right_medium
    dimension: position_offset
    magnitude: medium
    layer: html
    params:
      min_offset_x_px: 11
      max_offset_x_px: 50
      offset_y_px: 0
    notes: "Shift ~25px right"

  - id: position_offset_right_large
    dimension: position_offset
    magnitude: large
    layer: html
    params:
      min_offset_x_px: 51
      max_offset_x_px: 150
      offset_y_px: 0
    notes: "Shift ~100px right"

  - id: position_offset_left_small
    dimension: position_offset
    magnitude: small
    layer: html
    params:
      min_offset_x_px: -10
      max_offset_x_px: -3
      offset_y_px: 0
    notes: "Shift ~5px left"

  - id: position_offset_left_medium
    dimension: position_offset
    magnitude: medium
    layer: html
    params:
      min_offset_x_px: -50
      max_offset_x_px: -11
      offset_y_px: 0
    notes: "Shift ~25px left"

  - id: position_offset_left_large
    dimension: position_offset
    magnitude: large
    layer: html
    params:
      min_offset_x_px: -150
      max_offset_x_px: -51
      offset_y_px: 0
    notes: "Shift ~100px left"

  - id: position_offset_down_small
    dimension: position_offset
    magnitude: small
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: 3
      max_offset_y_px: 10
    notes: "Shift ~5px down"

  - id: position_offset_down_medium
    dimension: position_offset
    magnitude: medium
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: 11
      max_offset_y_px: 50
    notes: "Shift ~25px down"

  - id: position_offset_down_large
    dimension: position_offset
    magnitude: large
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: 51
      max_offset_y_px: 150
    notes: "Shift ~100px down"

  - id: position_offset_up_small
    dimension: position_offset
    magnitude: small
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: -10
      max_offset_y_px: -3
    notes: "Shift ~5px up"

  - id: position_offset_up_medium
    dimension: position_offset
    magnitude: medium
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: -50
      max_offset_y_px: -11
    notes: "Shift ~25px up"

  - id: position_offset_up_large
    dimension: position_offset
    magnitude: large
    layer: html
    params:
      offset_x_px: 0
      min_offset_y_px: -150
      max_offset_y_px: -51
    notes: "Shift ~100px up"

  # ---------------------------------------------------------------------------
  # SCALE ERROR — signed % deviation from correct font size (10 configs)
  # Negative values = too small; positive = too large
  # ---------------------------------------------------------------------------
  - id: scale_error_up_small
    dimension: scale_error
    magnitude: small
    layer: html
    params:
      min_scale_error_pct: 2.0
      max_scale_error_pct: 5.0
    notes: "Font ~3% too large"

  - id: scale_error_up_medium
    dimension: scale_error
    magnitude: medium
    layer: html
    params:
      min_scale_error_pct: 6.0
      max_scale_error_pct: 14.0
    notes: "Font ~10% too large"

  - id: scale_error_up_large
    dimension: scale_error
    magnitude: large
    layer: html
    params:
      min_scale_error_pct: 15.0
      max_scale_error_pct: 35.0
    notes: "Font ~25% too large"

  - id: scale_error_up_xlarge
    dimension: scale_error
    magnitude: xlarge
    layer: html
    params:
      min_scale_error_pct: 36.0
      max_scale_error_pct: 65.0
    notes: "Font ~50% too large"

  - id: scale_error_up_xxlarge
    dimension: scale_error
    magnitude: xxlarge
    layer: html
    params:
      min_scale_error_pct: 66.0
      max_scale_error_pct: 90.0
    notes: "Font ~75% too large"

  - id: scale_error_down_small
    dimension: scale_error
    magnitude: small
    layer: html
    params:
      min_scale_error_pct: -5.0
      max_scale_error_pct: -2.0
    notes: "Font ~3% too small"

  - id: scale_error_down_medium
    dimension: scale_error
    magnitude: medium
    layer: html
    params:
      min_scale_error_pct: -14.0
      max_scale_error_pct: -6.0
    notes: "Font ~10% too small"

  - id: scale_error_down_large
    dimension: scale_error
    magnitude: large
    layer: html
    params:
      min_scale_error_pct: -35.0
      max_scale_error_pct: -15.0
    notes: "Font ~25% too small"

  - id: scale_error_down_xlarge
    dimension: scale_error
    magnitude: xlarge
    layer: html
    params:
      min_scale_error_pct: -65.0
      max_scale_error_pct: -36.0
    notes: "Font ~50% too small"

  - id: scale_error_down_xxlarge
    dimension: scale_error
    magnitude: xxlarge
    layer: html
    params:
      min_scale_error_pct: -90.0
      max_scale_error_pct: -66.0
    notes: "Font ~75% too small (quarter size)"

  # ---------------------------------------------------------------------------
  # ROTATION — signed degrees (10 configs)
  # Negative = counter-clockwise
  # ---------------------------------------------------------------------------
  - id: rotation_cw_tiny
    dimension: rotation
    magnitude: tiny
    layer: html
    params:
      min_angle_deg: 0.5
      max_angle_deg: 1.5
    notes: "~1° clockwise rotation"

  - id: rotation_cw_small
    dimension: rotation
    magnitude: small
    layer: html
    params:
      min_angle_deg: 1.5
      max_angle_deg: 4.5
    notes: "~3° clockwise rotation"

  - id: rotation_cw_medium
    dimension: rotation
    magnitude: medium
    layer: html
    params:
      min_angle_deg: 4.5
      max_angle_deg: 8.0
    notes: "~5° clockwise rotation"

  - id: rotation_cw_large
    dimension: rotation
    magnitude: large
    layer: html
    params:
      min_angle_deg: 10.0
      max_angle_deg: 20.0
    notes: "~15° clockwise rotation"

  - id: rotation_cw_xlarge
    dimension: rotation
    magnitude: xlarge
    layer: html
    params:
      min_angle_deg: 20.0
      max_angle_deg: 28.0
    notes: "~22° clockwise rotation"

  - id: rotation_ccw_tiny
    dimension: rotation
    magnitude: tiny
    layer: html
    params:
      min_angle_deg: -1.5
      max_angle_deg: -0.5
    notes: "~1° counter-clockwise rotation"

  - id: rotation_ccw_small
    dimension: rotation
    magnitude: small
    layer: html
    params:
      min_angle_deg: -4.5
      max_angle_deg: -1.5
    notes: "~3° counter-clockwise rotation"

  - id: rotation_ccw_medium
    dimension: rotation
    magnitude: medium
    layer: html
    params:
      min_angle_deg: -8.0
      max_angle_deg: -4.5
    notes: "~5° counter-clockwise rotation"

  - id: rotation_ccw_large
    dimension: rotation
    magnitude: large
    layer: html
    params:
      min_angle_deg: -20.0
      max_angle_deg: -10.0
    notes: "~15° counter-clockwise rotation"

  - id: rotation_ccw_xlarge
    dimension: rotation
    magnitude: xlarge
    layer: html
    params:
      min_angle_deg: -28.0
      max_angle_deg: -20.0
    notes: "~22° counter-clockwise rotation"

  # ---------------------------------------------------------------------------
  # FONT WEIGHT — 9 configs (100–900 in steps of 100)
  # Discrete CSS values; no jitter range (no meaningful intermediate values)
  # ---------------------------------------------------------------------------
  - id: font_weight_100
    dimension: font_weight
    magnitude: weight_100
    layer: html
    params:
      font_weight: 100
    notes: "Thin (100)"

  - id: font_weight_200
    dimension: font_weight
    magnitude: weight_200
    layer: html
    params:
      font_weight: 200
    notes: "Extra-light (200)"

  - id: font_weight_300
    dimension: font_weight
    magnitude: weight_300
    layer: html
    params:
      font_weight: 300
    notes: "Light (300)"

  - id: font_weight_400
    dimension: font_weight
    magnitude: weight_400
    layer: html
    params:
      font_weight: 400
    notes: "Regular (400)"

  - id: font_weight_500
    dimension: font_weight
    magnitude: weight_500
    layer: html
    params:
      font_weight: 500
    notes: "Medium (500)"

  - id: font_weight_600
    dimension: font_weight
    magnitude: weight_600
    layer: html
    params:
      font_weight: 600
    notes: "Semi-bold (600)"

  - id: font_weight_700
    dimension: font_weight
    magnitude: weight_700
    layer: html
    params:
      font_weight: 700
    notes: "Bold (700)"

  - id: font_weight_800
    dimension: font_weight
    magnitude: weight_800
    layer: html
    params:
      font_weight: 800
    notes: "Extra-bold (800)"

  - id: font_weight_900
    dimension: font_weight
    magnitude: weight_900
    layer: html
    params:
      font_weight: 900
    notes: "Black (900)"

  # ---------------------------------------------------------------------------
  # FONT STYLE — 2 configs (categorical; no jitter)
  # ---------------------------------------------------------------------------
  - id: font_style_italic
    dimension: font_style
    magnitude: italic
    layer: html
    params:
      font_style: "italic"
    notes: "Switch to italic"

  - id: font_style_oblique
    dimension: font_style
    magnitude: oblique
    layer: html
    params:
      font_style: "oblique"
    notes: "Switch to oblique"

  # ---------------------------------------------------------------------------
  # LETTER SPACING — 3 positive + 2 negative = 5 configs
  # ---------------------------------------------------------------------------
  - id: letter_spacing_pos_small
    dimension: letter_spacing
    magnitude: small
    layer: html
    params:
      min_letter_spacing_px: 1.0
      max_letter_spacing_px: 3.0
    notes: "+~2px letter spacing"

  - id: letter_spacing_pos_medium
    dimension: letter_spacing
    magnitude: medium
    layer: html
    params:
      min_letter_spacing_px: 3.0
      max_letter_spacing_px: 8.0
    notes: "+~5px letter spacing"

  - id: letter_spacing_pos_large
    dimension: letter_spacing
    magnitude: large
    layer: html
    params:
      min_letter_spacing_px: 8.0
      max_letter_spacing_px: 15.0
    notes: "+~10px letter spacing"

  - id: letter_spacing_neg_small
    dimension: letter_spacing
    magnitude: small
    layer: html
    params:
      min_letter_spacing_px: -1.5
      max_letter_spacing_px: -0.5
    notes: "~-1px letter spacing"

  - id: letter_spacing_neg_medium
    dimension: letter_spacing
    magnitude: medium
    layer: html
    params:
      min_letter_spacing_px: -3.0
      max_letter_spacing_px: -1.5
    notes: "~-2px letter spacing"

  # ---------------------------------------------------------------------------
  # OPACITY — 10 configs (jittered around each perceptual level)
  # ---------------------------------------------------------------------------
  - id: opacity_95
    dimension: opacity
    magnitude: p95
    layer: html
    params:
      min_opacity: 0.92
      max_opacity: 0.98
    notes: "~5% transparent"

  - id: opacity_90
    dimension: opacity
    magnitude: p90
    layer: html
    params:
      min_opacity: 0.87
      max_opacity: 0.93
    notes: "~10% transparent"

  - id: opacity_85
    dimension: opacity
    magnitude: p85
    layer: html
    params:
      min_opacity: 0.82
      max_opacity: 0.88
    notes: "~15% transparent"

  - id: opacity_80
    dimension: opacity
    magnitude: p80
    layer: html
    params:
      min_opacity: 0.77
      max_opacity: 0.83
    notes: "~20% transparent"

  - id: opacity_75
    dimension: opacity
    magnitude: p75
    layer: html
    params:
      min_opacity: 0.72
      max_opacity: 0.78
    notes: "~25% transparent"

  - id: opacity_70
    dimension: opacity
    magnitude: p70
    layer: html
    params:
      min_opacity: 0.67
      max_opacity: 0.73
    notes: "~30% transparent"

  - id: opacity_60
    dimension: opacity
    magnitude: p60
    layer: html
    params:
      min_opacity: 0.56
      max_opacity: 0.64
    notes: "~40% transparent"

  - id: opacity_50
    dimension: opacity
    magnitude: p50
    layer: html
    params:
      min_opacity: 0.46
      max_opacity: 0.54
    notes: "~50% transparent"

  - id: opacity_40
    dimension: opacity
    magnitude: p40
    layer: html
    params:
      min_opacity: 0.36
      max_opacity: 0.44
    notes: "~60% transparent"

  - id: opacity_30
    dimension: opacity
    magnitude: p30
    layer: html
    params:
      min_opacity: 0.26
      max_opacity: 0.34
    notes: "~70% transparent"

  # ---------------------------------------------------------------------------
  # FONT FAMILY — 7 configs (categorical; no jitter)
  # Magnitude label = short font name; visual distance from target is computed
  # at generation time by comparing CSS font-family categories.
  # ---------------------------------------------------------------------------
  - id: font_family_arial
    dimension: font_family
    magnitude: arial
    layer: html
    params:
      font_family: "Arial, Helvetica, sans-serif"
    notes: "Grotesque sans-serif"

  - id: font_family_verdana
    dimension: font_family
    magnitude: verdana
    layer: html
    params:
      font_family: "Verdana, Geneva, sans-serif"
    notes: "Humanist sans-serif (wider)"

  - id: font_family_trebuchet
    dimension: font_family
    magnitude: trebuchet
    layer: html
    params:
      font_family: "'Trebuchet MS', Arial, sans-serif"
    notes: "Humanist sans-serif"

  - id: font_family_georgia
    dimension: font_family
    magnitude: georgia
    layer: html
    params:
      font_family: "Georgia, 'Times New Roman', serif"
    notes: "Old-style serif"

  - id: font_family_palatino
    dimension: font_family
    magnitude: palatino
    layer: html
    params:
      font_family: "'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    notes: "Humanist serif"

  - id: font_family_courier
    dimension: font_family
    magnitude: courier
    layer: html
    params:
      font_family: "'Courier New', Courier, monospace"
    notes: "Monospace — strongly different from proportional fonts"

  - id: font_family_impact
    dimension: font_family
    magnitude: impact
    layer: html
    params:
      font_family: "Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif"
    notes: "Condensed display sans-serif — strongly different from body fonts"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: GAUSSIAN NOISE — 3 configs
  # ---------------------------------------------------------------------------
  - id: gaussian_noise_small
    dimension: gaussian_noise
    magnitude: small
    layer: image
    params:
      min_sigma: 3
      max_sigma: 8
    notes: "Light Gaussian noise (σ ~5)"

  - id: gaussian_noise_medium
    dimension: gaussian_noise
    magnitude: medium
    layer: image
    params:
      min_sigma: 9
      max_sigma: 22
    notes: "Moderate Gaussian noise (σ ~15)"

  - id: gaussian_noise_large
    dimension: gaussian_noise
    magnitude: large
    layer: image
    params:
      min_sigma: 23
      max_sigma: 40
    notes: "Heavy Gaussian noise (σ ~30)"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: JPEG COMPRESSION — 3 configs
  # Higher quality = less compression; ranges are non-overlapping windows
  # ---------------------------------------------------------------------------
  - id: jpeg_compression_light
    dimension: jpeg_compression
    magnitude: light
    layer: image
    params:
      min_quality: 72
      max_quality: 90
    notes: "Mild JPEG compression (quality ~80)"

  - id: jpeg_compression_medium
    dimension: jpeg_compression
    magnitude: medium
    layer: image
    params:
      min_quality: 40
      max_quality: 65
    notes: "Moderate JPEG compression (quality ~50)"

  - id: jpeg_compression_heavy
    dimension: jpeg_compression
    magnitude: heavy
    layer: image
    params:
      min_quality: 10
      max_quality: 35
    notes: "Heavy JPEG compression (quality ~20)"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: BLUR — 3 configs
  # ---------------------------------------------------------------------------
  - id: blur_small
    dimension: blur
    magnitude: small
    layer: image
    params:
      min_radius: 0.5
      max_radius: 2.0
    notes: "Slight Gaussian blur (r ~1)"

  - id: blur_medium
    dimension: blur
    magnitude: medium
    layer: image
    params:
      min_radius: 2.1
      max_radius: 4.0
    notes: "Noticeable Gaussian blur (r ~3)"

  - id: blur_large
    dimension: blur
    magnitude: large
    layer: image
    params:
      min_radius: 4.1
      max_radius: 7.0
    notes: "Heavy Gaussian blur (r ~5)"
