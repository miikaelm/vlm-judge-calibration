    notes: "Semi-bold (600)"

  - id: font_weight_700
    dimension: font_weight
    magnitude: weight_700
    layer: html
    params:
      font_weight: 700
    notes: "Bold (700)"

  - id: font_weight_800
    dimension: font_weight
    magnitude: weight_800
    layer: html
    params:
      font_weight: 800
    notes: "Extra-bold (800)"

  - id: font_weight_900
    dimension: font_weight
    magnitude: weight_900
    layer: html
    params:
      font_weight: 900
    notes: "Black (900)"

  # ---------------------------------------------------------------------------
  # FONT STYLE — 2 configs
  # ---------------------------------------------------------------------------
  - id: font_style_italic
    dimension: font_style
    magnitude: italic
    layer: html
    params:
      font_style: "italic"
    notes: "Switch to italic"

  - id: font_style_oblique
    dimension: font_style
    magnitude: oblique
    layer: html
    params:
      font_style: "oblique"
    notes: "Switch to oblique"

  # ---------------------------------------------------------------------------
  # LETTER SPACING — 4 positive + 4 negative = 8 configs
  # ---------------------------------------------------------------------------
  - id: letter_spacing_pos_tiny
    dimension: letter_spacing
    magnitude: pos_0_5px
    layer: html
    params:
      letter_spacing_px: 0.5
    notes: "+0.5px letter spacing"

  - id: letter_spacing_pos_small
    dimension: letter_spacing
    magnitude: pos_1px
    layer: html
    params:
      letter_spacing_px: 1
    notes: "+1px letter spacing"

  - id: letter_spacing_pos_medium
    dimension: letter_spacing
    magnitude: pos_2px
    layer: html
    params:
      letter_spacing_px: 2
    notes: "+2px letter spacing"

  - id: letter_spacing_pos_large
    dimension: letter_spacing
    magnitude: pos_5px
    layer: html
    params:
      letter_spacing_px: 5
    notes: "+5px letter spacing"

  - id: letter_spacing_pos_xlarge
    dimension: letter_spacing
    magnitude: pos_10px
    layer: html
    params:
      letter_spacing_px: 10
    notes: "+10px letter spacing"

  - id: letter_spacing_neg_tiny
    dimension: letter_spacing
    magnitude: neg_0_5px
    layer: html
    params:
      letter_spacing_px: -0.5
    notes: "-0.5px letter spacing"

  - id: letter_spacing_neg_small
    dimension: letter_spacing
    magnitude: neg_1px
    layer: html
    params:
      letter_spacing_px: -1
    notes: "-1px letter spacing"

  - id: letter_spacing_neg_medium
    dimension: letter_spacing
    magnitude: neg_2px
    layer: html
    params:
      letter_spacing_px: -2
    notes: "-2px letter spacing"

  - id: letter_spacing_neg_large
    dimension: letter_spacing
    magnitude: neg_5px
    layer: html
    params:
      letter_spacing_px: -5
    notes: "-5px letter spacing"

  - id: letter_spacing_neg_xlarge
    dimension: letter_spacing
    magnitude: neg_10px
    layer: html
    params:
      letter_spacing_px: -10
    notes: "-10px letter spacing"

  # ---------------------------------------------------------------------------
  # OPACITY — 10 configs (0.95 → 0.30, fully unidirectional, less opaque)
  # ---------------------------------------------------------------------------
  - id: opacity_95
    dimension: opacity
    magnitude: opacity_0_95
    layer: html
    params:
      opacity: 0.95
    notes: "5% transparent"

  - id: opacity_90
    dimension: opacity
    magnitude: opacity_0_9
    layer: html
    params:
      opacity: 0.9
    notes: "10% transparent"

  - id: opacity_85
    dimension: opacity
    magnitude: opacity_0_85
    layer: html
    params:
      opacity: 0.85
    notes: "15% transparent"

  - id: opacity_80
    dimension: opacity
    magnitude: opacity_0_8
    layer: html
    params:
      opacity: 0.8
    notes: "20% transparent"

  - id: opacity_75
    dimension: opacity
    magnitude: opacity_0_75
    layer: html
    params:
      opacity: 0.75
    notes: "25% transparent"

  - id: opacity_70
    dimension: opacity
    magnitude: opacity_0_7
    layer: html
    params:
      opacity: 0.7
    notes: "30% transparent"

  - id: opacity_60
    dimension: opacity
    magnitude: opacity_0_6
    layer: html
    params:
      opacity: 0.6
    notes: "40% transparent"

  - id: opacity_50
    dimension: opacity
    magnitude: opacity_0_5
    layer: html
    params:
      opacity: 0.5
    notes: "50% transparent"

  - id: opacity_40
    dimension: opacity
    magnitude: opacity_0_4
    layer: html
    params:
      opacity: 0.4
    notes: "60% transparent"

  - id: opacity_30
    dimension: opacity
    magnitude: opacity_0_3
    layer: html
    params:
      opacity: 0.3
    notes: "70% transparent"

  # ---------------------------------------------------------------------------
  # CHARACTER SUBSTITUTION — 3 tiers (similar) + 3 tiers (random) = 6 configs
  # ---------------------------------------------------------------------------
  - id: char_sub_1_similar
    dimension: char_substitution
    magnitude: 1_similar
    layer: html
    params:
      num_substitutions: 1
      tier: 1_similar
    notes: "1 char replaced with visually similar confusable"

  - id: char_sub_2_similar
    dimension: char_substitution
    magnitude: 2_similar
    layer: html
    params:
      num_substitutions: 2
      tier: 1_similar
    notes: "2 chars replaced with visually similar confusables"

  - id: char_sub_3_similar
    dimension: char_substitution
    magnitude: 3_similar
    layer: html
    params:
      num_substitutions: 3
      tier: 1_similar
    notes: "3 chars replaced with visually similar confusables"

  - id: char_sub_1_random
    dimension: char_substitution
    magnitude: 1_random
    layer: html
    params:
      substitutions:
        - {position: 0, original: "H", replacement: "X"}
      num_substitutions: 1
      tier: random
    notes: "1 char replaced with unrelated character"

  - id: char_sub_2_random
    dimension: char_substitution
    magnitude: 2_random
    layer: html
    params:
      substitutions:
        - {position: 0, original: "H", replacement: "X"}
        - {position: 2, original: "a", replacement: "z"}
      num_substitutions: 2
      tier: random
    notes: "2 chars replaced with unrelated characters"

  - id: char_sub_3_random
    dimension: char_substitution
    magnitude: 3_random
    layer: html
    params:
      substitutions:
        - {position: 0, original: "H", replacement: "X"}
        - {position: 2, original: "a", replacement: "z"}
        - {position: 4, original: "i", replacement: "q"}
      num_substitutions: 3
      tier: random
    notes: "3 chars replaced with unrelated characters"

  # ---------------------------------------------------------------------------
  # WORD-LEVEL ERRORS — 3 configs
  # ---------------------------------------------------------------------------
  - id: word_error_wrong
    dimension: word_error
    magnitude: wrong_word
    layer: html
    params:
      error_type: wrong_word
      word_index: 0
      replacement: "Wrong"
    notes: "First word replaced with 'Wrong'"

  - id: word_error_missing
    dimension: word_error
    magnitude: missing_word
    layer: html
    params:
      error_type: missing_word
      word_index: 0
    notes: "First word removed"

  - id: word_error_extra
    dimension: word_error
    magnitude: extra_word
    layer: html
    params:
      error_type: extra_word
      word_index: 0
      extra_word: "Extra"
    notes: "Extra word inserted after first word"

  # ---------------------------------------------------------------------------
  # CASE ERRORS — 3 configs
  # ---------------------------------------------------------------------------
  - id: case_error_first_flip
    dimension: case_error
    magnitude: first_char_flip
    layer: html
    params:
      case_type: first_char_flip
    notes: "First character case flipped"

  - id: case_error_all_caps
    dimension: case_error
    magnitude: all_caps
    layer: html
    params:
      case_type: all_caps
    notes: "All text uppercased"

  - id: case_error_all_lower
    dimension: case_error
    magnitude: all_lower
    layer: html
    params:
      case_type: all_lower
    notes: "All text lowercased"

  # ---------------------------------------------------------------------------
  # CONTENT SWAP — 3 configs (generic replacements, always wrong regardless of edit)
  # ---------------------------------------------------------------------------
  - id: content_swap_partial
    dimension: content_swap
    magnitude: partial
    layer: html
    params:
      new_text: "Text"
    notes: "Replaced with very short generic text"

  - id: content_swap_similar
    dimension: content_swap
    magnitude: similar
    layer: html
    params:
      new_text: "Sample Heading"
    notes: "Replaced with plausible but wrong text"

  - id: content_swap_wrong
    dimension: content_swap
    magnitude: completely_wrong
    layer: html
    params:
      new_text: "XXXXXXXXXXX"
    notes: "Replaced with obviously wrong placeholder"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: GAUSSIAN NOISE — 3 configs
  # ---------------------------------------------------------------------------
  - id: gaussian_noise_small
    dimension: gaussian_noise
    magnitude: sigma_5
    layer: image
    params:
      sigma: 5
    notes: "Light Gaussian noise (σ=5)"

  - id: gaussian_noise_medium
    dimension: gaussian_noise
    magnitude: sigma_15
    layer: image
    params:
      sigma: 15
    notes: "Moderate Gaussian noise (σ=15)"

  - id: gaussian_noise_large
    dimension: gaussian_noise
    magnitude: sigma_30
    layer: image
    params:
      sigma: 30
    notes: "Heavy Gaussian noise (σ=30)"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: JPEG COMPRESSION — 3 configs
  # ---------------------------------------------------------------------------
  - id: jpeg_compression_light
    dimension: jpeg_compression
    magnitude: quality_80
    layer: image
    params:
      quality: 80
    notes: "Mild JPEG compression (quality=80)"

  - id: jpeg_compression_medium
    dimension: jpeg_compression
    magnitude: quality_50
    layer: image
    params:
      quality: 50
    notes: "Moderate JPEG compression (quality=50)"

  - id: jpeg_compression_heavy
    dimension: jpeg_compression
    magnitude: quality_20
    layer: image
    params:
      quality: 20
    notes: "Heavy JPEG compression (quality=20)"

  # ---------------------------------------------------------------------------
  # IMAGE-LAYER: BLUR — 3 configs
  # ---------------------------------------------------------------------------
  - id: blur_small
    dimension: blur
    magnitude: radius_1
    layer: image
    params:
      radius: 1
    notes: "Slight Gaussian blur (r=1)"

  - id: blur_medium
    dimension: blur
    magnitude: radius_3
    layer: image
    params:
      radius: 3
    notes: "Noticeable Gaussian blur (r=3)"

  - id: blur_large
    dimension: blur
    magnitude: radius_5
    layer: image
    params:
      radius: 5
    notes: "Heavy Gaussian blur (r=5)"
