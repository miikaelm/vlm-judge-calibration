# Degradation configurations — full sweep
# HTML-layer: ~74 configs | Image-layer: 9 configs | Total: 83 configs
# Each config combines with edit_types × templates to form the stimulus table.

degradations:

  # ---------------------------------------------------------------------------
  # COLOR OFFSET — ΔE in CIEDE2000 (10 magnitudes: 1, 2, 3, 5, 7, 10, 15, 20, 30, 40)
  # ---------------------------------------------------------------------------
  - id: color_offset_micro
    dimension: color_offset
    magnitude: delta_e_1
    layer: html
    params:
      delta_e: 1.0
    notes: "Sub-threshold color shift (ΔE~1)"

  - id: color_offset_tiny
    dimension: color_offset
    magnitude: delta_e_2
    layer: html
    params:
      delta_e: 2.0
    notes: "Near-threshold color shift (ΔE~2)"

  - id: color_offset_subtle
    dimension: color_offset
    magnitude: delta_e_3
    layer: html
    params:
      delta_e: 3.0
    notes: "Subtle color shift (ΔE~3)"

  - id: color_offset_small
    dimension: color_offset
    magnitude: delta_e_5
    layer: html
    params:
      delta_e: 5.0
    notes: "Just-noticeable color shift (ΔE~5)"

  - id: color_offset_moderate
    dimension: color_offset
    magnitude: delta_e_7
    layer: html
    params:
      delta_e: 7.0
    notes: "Moderate color shift (ΔE~7)"

  - id: color_offset_medium
    dimension: color_offset
    magnitude: delta_e_10
    layer: html
    params:
      delta_e: 10.0
    notes: "Clearly visible color shift (ΔE~10)"

  - id: color_offset_strong
    dimension: color_offset
    magnitude: delta_e_15
    layer: html
    params:
      delta_e: 15.0
    notes: "Strong color shift (ΔE~15)"

  - id: color_offset_large
    dimension: color_offset
    magnitude: delta_e_20
    layer: html
    params:
      delta_e: 20.0
    notes: "Large color shift (ΔE~20)"

  - id: color_offset_very_large
    dimension: color_offset
    magnitude: delta_e_30
    layer: html
    params:
      delta_e: 30.0
    notes: "Very large color shift (ΔE~30)"

  - id: color_offset_xlarge
    dimension: color_offset
    magnitude: delta_e_40
    layer: html
    params:
      delta_e: 40.0
    notes: "Obviously wrong color (ΔE~40)"

  # ---------------------------------------------------------------------------
  # POSITION OFFSET — 4 directions × 3 magnitudes = 12 configs
  # ---------------------------------------------------------------------------
  - id: position_offset_right_small
    dimension: position_offset
    magnitude: right_5px
    layer: html
    params:
      offset_x_px: 5
      offset_y_px: 0
    notes: "Shift 5px right"

  - id: position_offset_right_medium
    dimension: position_offset
    magnitude: right_25px
    layer: html
    params:
      offset_x_px: 25
      offset_y_px: 0
    notes: "Shift 25px right"

  - id: position_offset_right_large
    dimension: position_offset
    magnitude: right_100px
    layer: html
    params:
      offset_x_px: 100
      offset_y_px: 0
    notes: "Shift 100px right"

  - id: position_offset_left_small
    dimension: position_offset
    magnitude: left_5px
    layer: html
    params:
      offset_x_px: -5
      offset_y_px: 0
    notes: "Shift 5px left"

  - id: position_offset_left_medium
    dimension: position_offset
    magnitude: left_25px
    layer: html
    params:
      offset_x_px: -25
      offset_y_px: 0
    notes: "Shift 25px left"

  - id: position_offset_left_large
    dimension: position_offset
    magnitude: left_100px
    layer: html
    params:
      offset_x_px: -100
      offset_y_px: 0
    notes: "Shift 100px left"

  - id: position_offset_down_small
    dimension: position_offset
    magnitude: down_5px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: 5
    notes: "Shift 5px down"

  - id: position_offset_down_medium
    dimension: position_offset
    magnitude: down_25px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: 25
    notes: "Shift 25px down"

  - id: position_offset_down_large
    dimension: position_offset
    magnitude: down_100px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: 100
    notes: "Shift 100px down"

  - id: position_offset_up_small
    dimension: position_offset
    magnitude: up_5px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: -5
    notes: "Shift 5px up"

  - id: position_offset_up_medium
    dimension: position_offset
    magnitude: up_25px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: -25
    notes: "Shift 25px up"

  - id: position_offset_up_large
    dimension: position_offset
    magnitude: up_100px
    layer: html
    params:
      offset_x_px: 0
      offset_y_px: -100
    notes: "Shift 100px up"

  # ---------------------------------------------------------------------------
  # SCALE ERROR — signed % deviation from correct font size (10 configs)
  # ---------------------------------------------------------------------------
  - id: scale_error_up_small
    dimension: scale_error
    magnitude: scale_up_3pct
    layer: html
    params:
      scale_error_pct: 3.0
    notes: "Font 3% too large"

  - id: scale_error_up_medium
    dimension: scale_error
    magnitude: scale_up_10pct
    layer: html
    params:
      scale_error_pct: 10.0
    notes: "Font 10% too large"

  - id: scale_error_up_large
    dimension: scale_error
    magnitude: scale_up_25pct
    layer: html
    params:
      scale_error_pct: 25.0
    notes: "Font 25% too large"

  - id: scale_error_up_xlarge
    dimension: scale_error
    magnitude: scale_up_50pct
    layer: html
    params:
      scale_error_pct: 50.0
    notes: "Font 50% too large"

  - id: scale_error_up_xxlarge
    dimension: scale_error
    magnitude: scale_up_100pct
    layer: html
    params:
      scale_error_pct: 100.0
    notes: "Font double the correct size"

  - id: scale_error_down_small
    dimension: scale_error
    magnitude: scale_down_3pct
    layer: html
    params:
      scale_error_pct: -3.0
    notes: "Font 3% too small"

  - id: scale_error_down_medium
    dimension: scale_error
    magnitude: scale_down_10pct
    layer: html
    params:
      scale_error_pct: -10.0
    notes: "Font 10% too small"

  - id: scale_error_down_large
    dimension: scale_error
    magnitude: scale_down_25pct
    layer: html
    params:
      scale_error_pct: -25.0
    notes: "Font 25% too small"

  - id: scale_error_down_xlarge
    dimension: scale_error
    magnitude: scale_down_50pct
    layer: html
    params:
      scale_error_pct: -50.0
    notes: "Font 50% too small"

  - id: scale_error_down_xxlarge
    dimension: scale_error
    magnitude: scale_down_75pct
    layer: html
    params:
      scale_error_pct: -75.0
    notes: "Font 75% too small (quarter size)"

  # ---------------------------------------------------------------------------
  # ROTATION — signed degrees (10 configs)
  # ---------------------------------------------------------------------------
  - id: rotation_cw_tiny
    dimension: rotation
    magnitude: cw_1deg
    layer: html
    params:
      angle_deg: 1
    notes: "1° clockwise rotation"

  - id: rotation_cw_small
    dimension: rotation
    magnitude: cw_3deg
    layer: html
    params:
      angle_deg: 3
    notes: "3° clockwise rotation"

  - id: rotation_cw_medium
    dimension: rotation
    magnitude: cw_5deg
    layer: html
    params:
      angle_deg: 5
    notes: "5° clockwise rotation"

  - id: rotation_cw_large
    dimension: rotation
    magnitude: cw_15deg
    layer: html
    params:
      angle_deg: 15
    notes: "15° clockwise rotation"

  - id: rotation_cw_xlarge
    dimension: rotation
    magnitude: cw_45deg
    layer: html
    params:
      angle_deg: 45
    notes: "45° clockwise rotation"

  - id: rotation_ccw_tiny
    dimension: rotation
    magnitude: ccw_1deg
    layer: html
    params:
      angle_deg: -1
    notes: "1° counter-clockwise rotation"

  - id: rotation_ccw_small
    dimension: rotation
    magnitude: ccw_3deg
    layer: html
    params:
      angle_deg: -3
    notes: "3° counter-clockwise rotation"

  - id: rotation_ccw_medium
    dimension: rotation
    magnitude: ccw_5deg
    layer: html
    params:
      angle_deg: -5
    notes: "5° counter-clockwise rotation"

  - id: rotation_ccw_large
    dimension: rotation
    magnitude: ccw_15deg
    layer: html
    params:
      angle_deg: -15
    notes: "15° counter-clockwise rotation"

  - id: rotation_ccw_xlarge
    dimension: rotation
    magnitude: ccw_45deg
    layer: html
    params:
      angle_deg: -45
    notes: "45° counter-clockwise rotation"

  # ---------------------------------------------------------------------------
  # FONT WEIGHT — 9 configs (100–900 in steps of 100, lightest to heaviest)
  # ---------------------------------------------------------------------------
  - id: font_weight_100
    dimension: font_weight
    magnitude: weight_100
    layer: html
    params:
      font_weight: 100
    notes: "Thin (100)"

  - id: font_weight_200
    dimension: font_weight
    magnitude: weight_200
    layer: html
    params:
      font_weight: 200
    notes: "Extra-light (200)"

  - id: font_weight_300
    dimension: font_weight
    magnitude: weight_300
    layer: html
    params:
      font_weight: 300
    notes: "Light (300)"

  - id: font_weight_400
    dimension: font_weight
    magnitude: weight_400
    layer: html
    params:
      font_weight: 400
    notes: "Regular (400)"

  - id: font_weight_500
    dimension: font_weight
    magnitude: weight_500
    layer: html
    params:
      font_weight: 500
    notes: "Medium (500)"

  - id: font_weight_600
    dimension: font_weight
    magnitude: weight_600
    layer: html
    params:
