# configs/templates.yaml — Layout metadata for analysis filtering and grouping.
#
# This file is NOT a source of rendering parameters — all CSS values live in
# src/layouts/definitions.py (role_base_styles, background, etc.).
# Use this file to filter/group layouts in analysis scripts.

layouts:
  - name: solo_headline
    difficulty: easy
    background_type: solid
    num_roles: 1
    notes: "Single large heading on white. Supports all edit types."

  - name: title_subtitle
    difficulty: easy
    background_type: solid
    num_roles: 2
    notes: "Centered vertical stack on light gray. Two roles."

  - name: header_body
    difficulty: easy
    background_type: solid
    num_roles: 2
    notes: "Left-aligned header + body paragraph on white."

  - name: title_byline
    difficulty: medium
    background_type: solid
    num_roles: 2
    notes: "Centered title + absolutely-positioned byline. Rotation on title, alignment on byline."

  - name: name_card
    difficulty: medium
    background_type: solid
    num_roles: 3
    notes: "Three-element centered stack. Three roles for wrong-element targeting."

  - name: quote_attribution
    difficulty: medium
    background_type: solid
    num_roles: 2
    notes: "Block quote (italic default) + attribution line."

  - name: corner_badge
    difficulty: medium
    background_type: solid
    num_roles: 2
    notes: "Dark blue bg. Centered label + corner badge. Badge alignment is the edit target."

  - name: split_panel
    difficulty: medium
    background_type: solid
    num_roles: 2
    notes: "Two-column split. Descriptor vertical alignment is the edit target."

  - name: banner_caption
    difficulty: medium
    background_type: solid
    num_roles: 2
    notes: "Large top banner + bottom caption. Caption text-align is the edit target."

  - name: two_column_heading
    difficulty: multi
    background_type: solid
    num_roles: 2
    notes: "Two side-by-side headings. Both roles can rotate — good for wrong-element targeting."

  - name: low_contrast_centered
    difficulty: hard
    background_type: gradient
    num_roles: 1
    notes: "Dark gradient bg, muted serif text, low contrast. Hard tier."
